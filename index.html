<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Izquierdos Barber Shop</title>
<link rel="icon" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="topbar">
    <img src="logo.png" class="logo" alt="Izquierdos Barber Shop">
    <div class="titles">
      <h1>IZQUIERDOS</h1>
      <p>Barber Shop</p>
    </div>
    <button id="btnTema" class="btn-icon" title="Cambiar tema">🌙</button>
    <button id="btnResumen" class="btn-icon" title="Resumen del día">📊</button>
  </header>

  <main id="app">

    <!-- ===== PANTALLA PRINCIPAL ===== -->
    <section id="screen-home" class="screen active">
      <h2 class="section-title">Selecciona tu nombre</h2>
      <div id="grid-barberos" class="grid-barberos">
        <p class="loading-text">Cargando barberos...</p>
      </div>
    </section>

    <!-- ===== PANTALLA SERVICIO ===== -->
    <section id="screen-servicio" class="screen">
      <button class="btn-volver" id="btnVolver">← Volver</button>
      <h2 class="section-title" id="nombreBarberoSeleccionado">Barbero</h2>
      <p class="subtitle">Selecciona el servicio</p>
      <div id="grid-servicios" class="grid-servicios">
        <p class="loading-text">Cargando servicios...</p>
      </div>
      <button id="btnRegistrar" class="btn-registrar" disabled>Registrar</button>
    </section>

    <!-- ===== PANEL ADMINISTRACIÓN ===== -->
    <section id="screen-admin" class="screen">
      <div class="admin-header">
        <button class="btn-volver" id="btnAdminSalir">← Salir de administración</button>
        <h2>Panel de administración</h2>
      </div>

      <div class="admin-tabs">
        <button class="tab-btn active" data-tab="tab-barberos">Barberos</button>
        <button class="tab-btn" data-tab="tab-servicios">Servicios</button>
        <button class="tab-btn" data-tab="tab-registros">Registros y ganancias</button>
      </div>

      <div id="tab-barberos" class="tab-content active">
        <div class="admin-add-form">
          <input type="text" id="nuevoBarberoNombre" placeholder="Nombre del nuevo barbero" class="input-text">
          <button id="btnAgregarBarbero" class="btn-primary">+ Agregar</button>
        </div>
        <div id="lista-admin-barberos" class="admin-list"></div>
      </div>

      <div id="tab-servicios" class="tab-content">
        <div class="admin-add-form">
          <input type="text" id="nuevoServicioNombre" placeholder="Nombre del servicio" class="input-text">
          <input type="number" id="nuevoServicioPrecio" placeholder="Precio $" class="input-text input-small">
          <button id="btnAgregarServicio" class="btn-primary">+ Agregar</button>
        </div>
        <div id="lista-admin-servicios" class="admin-list"></div>
      </div>

      <div id="tab-registros" class="tab-content">
        <div class="filtro-fechas">
          <label>Desde <input type="date" id="fechaInicio"></label>
          <label>Hasta <input type="date" id="fechaFin"></label>
          <button id="btnFiltrarRegistros" class="btn-primary">Buscar</button>
        </div>
        <div class="total-general" id="totalGeneralRegistros"></div>
        <div id="tabla-registros-resumen" class="tabla-resumen"></div>
        <h3 class="detalle-title">Detalle de registros</h3>
        <div class="tabla-detalle-wrap">
          <table class="tabla-detalle">
            <thead><tr><th>Fecha</th><th>Hora</th><th>Barbero</th><th>Servicio</th><th>Precio</th></tr></thead>
            <tbody id="tablaDetalleRegistrosBody"></tbody>
          </table>
        </div>
      </div>
    </section>

  </main>

  <!-- ===== OVERLAY CONFIRMACIÓN ===== -->
  <div id="overlay-confirm" class="overlay hidden">
    <div class="confirm-box">
      <div class="confirm-icon">✅</div>
      <p id="confirm-text"></p>
    </div>
  </div>

  <!-- ===== MODAL RESUMEN DEL DÍA ===== -->
  <div id="modal-resumen" class="overlay hidden">
    <div class="modal-box">
      <button class="btn-cerrar" data-close="modal-resumen">✕</button>
      <h2>Resumen de hoy</h2>
      <p class="fecha-resumen" id="fechaResumen"></p>
      <div id="tabla-resumen" class="tabla-resumen"></div>
      <div class="total-general" id="totalGeneral"></div>
    </div>
  </div>

  <!-- ===== MODAL INFO DIARIA DE UN BARBERO ===== -->
  <div id="modal-info-barbero" class="overlay hidden">
    <div class="modal-box modal-small">
      <button class="btn-cerrar" data-close="modal-info-barbero">✕</button>
      <h2 id="infoBarberoNombre">Barbero</h2>
      <p class="fecha-resumen" id="infoBarberoFecha"></p>
      <div id="infoBarberoDetalle" class="tabla-resumen"></div>
      <div class="total-general" id="infoBarberoTotal"></div>
    </div>
  </div>

  <!-- ===== MODAL LOGIN ADMIN ===== -->
  <div id="modal-admin-login" class="overlay hidden">
    <div class="modal-box modal-small">
      <button class="btn-cerrar" data-close="modal-admin-login">✕</button>
      <h2>Acceso administrador</h2>
      <input type="password" id="inputAdminPassword" placeholder="Contraseña" class="input-text">
      <button id="btnAdminLogin" class="btn-primary btn-full">Entrar</button>
      <p id="adminLoginError" class="error-text"></p>
    </div>
  </div>

  <footer class="footer">
    <button id="btnAdminAcceso" class="link-discreto">Administrar</button>
    <span class="footer-text">© Izquierdos Barber Shop</span>
  </footer>

  <div id="loading" class="loading hidden"><div class="spinner"></div></div>

  <script src="app.js"></script>
</body>
</html>
